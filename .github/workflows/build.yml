name: Build and Upload

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version'
        required: true

jobs:
  build :
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: freebsd
            arch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: SagerNet/sing-box
          ref: v${{ github.event.inputs.version }}
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.1
      - name: Set build tags
        run: |
          TAGS='with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_tailscale'
          echo "BUILD_TAGS=${TAGS}" >> "${GITHUB_ENV}"
      - name: Build
        run: |
          mkdir -p dist
          go build -v -trimpath -o dist/sing-box -tags "${BUILD_TAGS}" \
          -ldflags "-s -buildid= -X github.com/sagernet/sing-box/constant.Version=${{ github.event.inputs.version }}" \
          ./cmd/sing-box
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
      - name: Package
        run: |
          mkdir -p output/sing-box-${{ github.event.inputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          mv dist/sing-box output/sing-box-${{ github.event.inputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          cp LICENSE output/sing-box-${{ github.event.inputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}_${{ matrix.arch }}
          path: output/*
